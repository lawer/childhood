<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Press+Start+2P&display=swap');
:root{--ink:#151528;--paper:#fffdf1;--cyan:#00e5ff;--pink:#ff2bac;--yellow:#ffe733;--grid:#a8daf0}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{max-width:min(1320px,94vw);margin:0 auto;padding:3rem clamp(1rem,4vw,4rem);color:var(--ink);font:1.15rem/1.55 "Comic Sans MS","Trebuchet MS",sans-serif;background-color:var(--paper);background-image:linear-gradient(rgba(80,170,210,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(80,170,210,.18) 1px,transparent 1px);background-size:24px 24px}
body:before{content:"CHILDHOOD // EDICIÓN CUADRÍCULA";display:block;padding:.9rem 1rem;margin-bottom:2rem;border:4px solid var(--ink);background:var(--yellow);box-shadow:8px 8px 0 var(--pink);font:clamp(.65rem,2vw,1rem)/1.5 "Press Start 2P",monospace;text-align:center;transform:rotate(-.5deg)}
h1,h2,h3{line-height:1.35}
h1,h2{font-family:"Press Start 2P",monospace;text-transform:uppercase}
h1{font-size:clamp(1.5rem,5vw,3.2rem);text-shadow:4px 4px 0 var(--cyan),7px 7px 0 var(--pink)}
h2{margin-top:4rem;padding:.8rem;border:4px solid var(--ink);background:var(--cyan);box-shadow:6px 6px 0 var(--ink);font-size:clamp(.9rem,2.4vw,1.35rem)}
h3{display:inline-block;margin-top:2rem;padding:.25rem .7rem;background:var(--pink);color:white;font-family:"Caveat",cursive;font-size:2rem;transform:rotate(-1deg)}
p,li{background:rgba(255,253,241,.76)}
blockquote{margin:2rem 0;padding:1rem 1.2rem;border:4px solid var(--ink);border-left:14px solid var(--pink);background:var(--yellow);box-shadow:6px 6px 0 var(--cyan);font-family:"Caveat",cursive;font-size:1.45rem}
table{display:block;width:100%;overflow-x:auto;border-collapse:collapse;background:var(--paper);box-shadow:6px 6px 0 var(--pink);font-size:clamp(.82rem,1.15vw,1rem);line-height:1.32}
th,td{padding:.48rem .55rem;border:3px solid var(--ink);text-align:left;vertical-align:top}
td[style*="text-align: right"],th[style*="text-align: right"]{white-space:nowrap;width:1%}
th{background:var(--yellow);font-family:"Press Start 2P",monospace;font-size:.7rem}
img{display:block;min-height:180px;width:100%;margin:2rem auto;border:4px dashed var(--pink);background:repeating-linear-gradient(135deg,#fff,#fff 16px,#e9fbff 16px,#e9fbff 32px);object-fit:contain}
img:after{content:"ILUSTRACIÓN PENDIENTE"}
figure{margin:2.2rem 0;padding:1rem;border:4px solid var(--ink);background:rgba(255,253,241,.92);box-shadow:7px 7px 0 var(--cyan);transform:rotate(-.2deg)}
figure img{margin:.2rem auto 0;border:3px solid var(--ink);box-shadow:none;background:#fff;min-height:0}
figcaption{margin-top:.65rem;font-family:"Caveat",cursive;font-size:1.35rem;line-height:1.15}
.reading-aid{margin:1.2rem 0;padding:.8rem 1rem;border:3px solid var(--ink);background:linear-gradient(90deg,var(--yellow),#fff7a8);box-shadow:5px 5px 0 var(--pink);font-family:"Caveat",cursive;font-size:1.35rem}
.reading-aid strong{font-family:"Comic Sans MS","Trebuchet MS",sans-serif;font-size:1rem}
.gameboy-map{box-shadow:7px 7px 0 var(--pink)}
.enemy-plate{box-shadow:7px 7px 0 var(--yellow)}
hr{margin:4rem 0;border:0;border-top:8px dotted var(--pink)}
code{padding:.15rem .35rem;background:var(--yellow);border:2px solid var(--ink)}
strong{background:linear-gradient(transparent 55%,var(--yellow) 55%)}
.reference-list{columns:2 280px;column-gap:2rem;margin:1.5rem 0;padding:1rem;border:3px solid var(--ink);background:rgba(255,253,241,.92);font-size:.92rem}
@media (max-width:700px){body{max-width:none;padding:1.25rem .8rem}table{font-size:.78rem}th,td{padding:.38rem .42rem}}
@media print{@page{size:A4;margin:14mm}body{max-width:none;padding:0;background:white;font-size:10pt}body:before{box-shadow:none}h2{break-before:page;box-shadow:none}h1,h2,h3,blockquote,table,img,figure{break-inside:avoid}table{font-size:8.3pt;line-height:1.22;box-shadow:none}th,td{padding:3pt 4pt;border-width:1.2pt}figure,.reading-aid{box-shadow:none}a{color:inherit;text-decoration:none}}
</style>
