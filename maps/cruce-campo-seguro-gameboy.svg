<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="t d">
<title id="t">Mapa Game Boy: cruce del campo</title><desc id="d">Aventura rural de cruce: zona de despliegue, zona segura, spawns de malos y marcadores furtivos.</desc>
<defs><style>.case{fill:#d8d7c8;stroke:#2f3140;stroke-width:10}.screen{fill:#9bbc0f;stroke:#2f3140;stroke-width:8}.grid{stroke:#306230;stroke-width:2}.txt{font:700 20px monospace;fill:#0f380f}.small{font:700 15px monospace;fill:#0f380f}.spawn{fill:#ff2bac;stroke:#0f380f;stroke-width:3}.deploy{fill:#00e5ff;stroke:#0f380f;stroke-width:3}.safe{fill:#63ff7b;stroke:#0f380f;stroke-width:3}.marker{fill:#ffe733;stroke:#0f380f;stroke-width:3}</style></defs>
<rect x="25" y="25" width="850" height="570" rx="42" class="case"/><rect x="100" y="70" width="700" height="470" rx="18" class="screen"/>
<g transform="translate(170 105)"><rect width="360" height="360" fill="#8bac0f" stroke="#0f380f" stroke-width="5"/><g class="grid"><path d="M30 0v360M60 0v360M90 0v360M120 0v360M150 0v360M180 0v360M210 0v360M240 0v360M270 0v360M300 0v360M330 0v360M0 30h360M0 60h360M0 90h360M0 120h360M0 150h360M0 180h360M0 210h360M0 240h360M0 270h360M0 300h360M0 330h360"/></g>
<rect x="0" y="300" width="360" height="60" class="deploy"/><rect x="0" y="0" width="360" height="45" class="safe"/><rect x="0" y="45" width="360" height="30" class="spawn"/><rect x="0" y="255" width="360" height="30" class="spawn"/>
<circle cx="80" cy="140" r="11" class="marker"/><circle cx="145" cy="205" r="11" class="marker"/><circle cx="230" cy="130" r="11" class="marker"/><circle cx="285" cy="215" r="11" class="marker"/><path d="M180 320V45" stroke="#0f380f" stroke-width="5" stroke-dasharray="12 10"/></g>
<text x="575" y="140" class="txt">CAMPO</text><text x="575" y="180" class="small">Tablero: 12x9 casillas</text><text x="575" y="210" class="small">Azul: despliegue</text><text x="575" y="240" class="small">Verde: zona segura</text><text x="575" y="270" class="small">Rosa: Spawn 1-3 / 4-6</text><text x="575" y="315" class="small">5 marcadores por jugador</text><text x="575" y="345" class="small">fuera de zonas marcadas</text>
