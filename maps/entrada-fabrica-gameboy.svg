<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="t d">
<title id="t">Mapa Game Boy: entrada de fábrica</title><desc id="d">Entrada de fábrica con zona de despliegue, entrada de drones y ninjas por bordes.</desc>
<defs><style>.case{fill:#d8d7c8;stroke:#2f3140;stroke-width:10}.screen{fill:#9bbc0f;stroke:#2f3140;stroke-width:8}.grid{stroke:#306230;stroke-width:2}.txt{font:700 20px monospace;fill:#0f380f}.small{font:700 15px monospace;fill:#0f380f}.deploy{fill:#00e5ff;stroke:#0f380f;stroke-width:3}.entrance{fill:#ffe733;stroke:#0f380f;stroke-width:4}.spawn{fill:#ff2bac;stroke:#0f380f;stroke-width:3}.drone{fill:#151528}.door{fill:#63ff7b;stroke:#0f380f;stroke-width:3}</style></defs>
<rect x="25" y="25" width="850" height="570" rx="42" class="case"/><rect x="100" y="70" width="700" height="470" rx="18" class="screen"/>
<g transform="translate(170 105)"><rect width="360" height="360" fill="#8bac0f" stroke="#0f380f" stroke-width="5"/><g class="grid"><path d="M30 0v360M60 0v360M90 0v360M120 0v360M150 0v360M180 0v360M210 0v360M240 0v360M270 0v360M300 0v360M330 0v360M0 30h360M0 60h360M0 90h360M0 120h360M0 150h360M0 180h360M0 210h360M0 240h360M0 270h360M0 300h360M0 330h360"/></g>
