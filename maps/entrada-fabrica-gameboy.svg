<text x="575" y="140" class="txt">ENTRADA</text><text x="575" y="180" class="small">Azul: peques</text><text x="575" y="210" class="small">Amarillo: drones</text><text x="575" y="240" class="small">4 drones/ronda</text><text x="575" y="270" class="small">Ninjas: bordes</text><text x="575" y="315" class="small">No salir hasta limpiar</text>
