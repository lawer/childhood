<text x="575" y="145" class="txt">AV.1 PUERTAS</text><text x="575" y="190" class="small">3 casas por pandilla</text><text x="575" y="220" class="small">Puertas = Tareas</text><text x="575" y="250" class="small">Gatos entran por Spawn</text><text x="575" y="300" class="small">Mantén 2 casillas</text><text x="575" y="330" class="small">entre casas</text>
