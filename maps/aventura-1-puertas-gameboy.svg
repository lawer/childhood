<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="t d">
<title id="t">Mapa Game Boy: Aventura 1</title><desc id="d">Tres casas por pandilla, puertas, spawns y gatos que aparecen por los bordes.</desc>
