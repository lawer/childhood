<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mapes imprimibles — Childhood</title>
  <style>
    body {
      margin: 0;
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      color: #171421;
      background:
        linear-gradient(rgba(40, 51, 255, .12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(40, 51, 255, .12) 1px, transparent 1px),
        #fff7df;
      background-size: 28px 28px;
    }
    main {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }
    a { color: inherit; }
    h1 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 7vw, 4.5rem);
      text-transform: uppercase;
      text-shadow: 4px 4px 0 #00d7ff, 8px 8px 0 #ff3dbb;
    }
    .back {
      display: inline-block;
      margin-bottom: 24px;
      border: 3px solid #171421;
      background: #ffe34f;
      padding: .5rem .75rem;
      text-decoration: none;
      box-shadow: 4px 4px 0 rgba(23, 20, 33, .24);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }
    .card {
      border: 4px solid #171421;
      border-radius: 18px;
      background: rgba(255,255,255,.84);
      padding: 14px;
      box-shadow: 7px 7px 0 rgba(23, 20, 33, .24);
      text-decoration: none;
    }
    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border: 3px solid #171421;
      border-radius: 12px;
      background: white;
    }
    .card span {
      display: block;
      margin-top: .7rem;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="../index.html">← Tornar a mapes</a>
    <h1>Mapes imprimibles</h1>
    <section class="grid" aria-label="Mapes imprimibles 12×12">
      <a class="card" href="el-vecindario-12x12.png"><img src="el-vecindario-12x12.png" alt="El Vecindario 12×12"><span>El Vecindario</span></a>
      <a class="card" href="el-cuartel-general-12x12.png"><img src="el-cuartel-general-12x12.png" alt="El Cuartel General 12×12"><span>El Cuartel General</span></a>
      <a class="card" href="el-patio-del-colegio-12x12.png"><img src="el-patio-del-colegio-12x12.png" alt="El Patio del Colegio 12×12"><span>El Patio del Colegio</span></a>
      <a class="card" href="el-recreativos-12x12.png"><img src="el-recreativos-12x12.png" alt="El Recreativos 12×12"><span>El Recreativos</span></a>
    </section>
  </main>
</body>
</html>
