<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="t d">
<title id="t">Mapa Game Boy: casa y camas</title><desc id="d">Aventura del Ratoncito Pérez con camas espaciadas, spawns de malos y casa.</desc>
<defs><style>.case{fill:#d8d7c8;stroke:#2f3140;stroke-width:10}.screen{fill:#9bbc0f;stroke:#2f3140;stroke-width:8}.grid{stroke:#306230;stroke-width:2}.txt{font:700 20px monospace;fill:#0f380f}.small{font:700 15px monospace;fill:#0f380f}.spawn{fill:#ff2bac;stroke:#0f380f;stroke-width:3}.room{fill:#8bac0f;stroke:#0f380f;stroke-width:5}.bed{fill:#00e5ff;stroke:#0f380f;stroke-width:3}.boss{fill:#151528}</style></defs>
<rect x="25" y="25" width="850" height="570" rx="42" class="case"/><rect x="100" y="70" width="700" height="470" rx="18" class="screen"/>
<g transform="translate(170 105)"><rect width="360" height="360" class="room"/><g class="grid"><path d="M30 0v360M60 0v360M90 0v360M120 0v360M150 0v360M180 0v360M210 0v360M240 0v360M270 0v360M300 0v360M330 0v360M0 30h360M0 60h360M0 90h360M0 120h360M0 150h360M0 180h360M0 210h360M0 240h360M0 270h360M0 300h360M0 330h360"/></g>
<rect x="0" y="0" width="360" height="30" class="spawn"/><rect x="0" y="330" width="360" height="30" class="spawn"/><rect x="0" y="0" width="30" height="360" class="spawn"/><rect x="330" y="0" width="30" height="360" class="spawn"/>
<rect x="75" y="75" width="60" height="30" class="bed"/><rect x="225" y="75" width="60" height="30" class="bed"/><rect x="75" y="255" width="60" height="30" class="bed"/><rect x="225" y="255" width="60" height="30" class="bed"/><circle cx="180" cy="180" r="18" class="boss"/></g>
<text x="575" y="140" class="txt">CASA</text><text x="575" y="180" class="small">1 cama por peque</text><text x="575" y="210" class="small">Camas repartidas</text><text x="575" y="240" class="small">Despertar: Mente</text><text x="575" y="285" class="small">Malos por Spawns</text>
</svg>
