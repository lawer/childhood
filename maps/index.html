<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mapes — Childhood</title>
  <style>
    body {
      margin: 0;
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      color: #171421;
      background:
        linear-gradient(rgba(40, 51, 255, .12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(40, 51, 255, .12) 1px, transparent 1px),
        #fff7df;
      background-size: 28px 28px;
    }
    main {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }
    a { color: inherit; }
    h1 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 7vw, 4.5rem);
      text-transform: uppercase;
      text-shadow: 4px 4px 0 #00d7ff, 8px 8px 0 #ff3dbb;
    }
    .back {
      display: inline-block;
      margin-bottom: 24px;
      border: 3px solid #171421;
      background: #ffe34f;
      padding: .5rem .75rem;
      text-decoration: none;
      box-shadow: 4px 4px 0 rgba(23, 20, 33, .24);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }
    .card {
      border: 4px solid #171421;
      border-radius: 18px;
      background: rgba(255,255,255,.84);
      padding: 14px;
      box-shadow: 7px 7px 0 rgba(23, 20, 33, .24);
      text-decoration: none;
    }
    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      border: 3px solid #171421;
      border-radius: 12px;
      background: white;
    }
    .card span {
      display: block;
      margin-top: .7rem;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="../index.html">← Tornar a l’inici</a>
    <h1>Mapes</h1>
    <section class="grid" aria-label="Mapes SVG tàctics i imprimibles">
      <a class="card" href="printable/index.html">
        <img src="printable/el-vecindario-12x12.png" alt="Galeria de mapes imprimibles">
        <span>Mapes imprimibles 12×12</span>
      </a>
      <a class="card" href="despliegue-basico-gameboy.svg"><img src="despliegue-basico-gameboy.svg" alt="Despliegue básico"><span>Despliegue básico</span></a>
      <a class="card" href="aventura-1-puertas-gameboy.svg"><img src="aventura-1-puertas-gameboy.svg" alt="Aventura 1 puertas"><span>Aventura 1 — Puertas</span></a>
      <a class="card" href="fuerte-central-gameboy.svg"><img src="fuerte-central-gameboy.svg" alt="Fuerte central"><span>Fuerte central</span></a>
      <a class="card" href="huida-alcantarilla-gameboy.svg"><img src="huida-alcantarilla-gameboy.svg" alt="Huida alcantarilla"><span>Huida alcantarilla</span></a>
      <a class="card" href="frigorifico-duendes-gameboy.svg"><img src="frigorifico-duendes-gameboy.svg" alt="Frigorífico duendes"><span>Frigorífico duendes</span></a>
      <a class="card" href="fabrica-final-gameboy.svg"><img src="fabrica-final-gameboy.svg" alt="Fábrica final"><span>Fábrica final</span></a>
      <a class="card" href="cruce-campo-seguro-gameboy.svg"><img src="cruce-campo-seguro-gameboy.svg" alt="Cruce campo seguro"><span>Cruce campo seguro</span></a>
      <a class="card" href="cruce-alcantarillas-gameboy.svg"><img src="cruce-alcantarillas-gameboy.svg" alt="Cruce alcantarillas"><span>Cruce alcantarillas</span></a>
      <a class="card" href="casa-camas-gameboy.svg"><img src="casa-camas-gameboy.svg" alt="Casa camas"><span>Casa camas</span></a>
      <a class="card" href="entrada-fabrica-gameboy.svg"><img src="entrada-fabrica-gameboy.svg" alt="Entrada fábrica"><span>Entrada fábrica</span></a>
    </section>
  </main>
</body>
</html>
