<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="t d">
<title id="t">Mapa Game Boy: cruce de alcantarillas</title><desc id="d">Cruce de alcantarillas con túneles de 4 casillas, mutantes en el centro, despliegues y desastres.</desc>
