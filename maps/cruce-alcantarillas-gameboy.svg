<text x="575" y="140" class="txt">ALCANTARILLA</text><text x="575" y="180" class="small">Túneles: 4 casillas</text><text x="575" y="210" class="small">Mutantes en cruce</text><text x="575" y="240" class="small">4 Desastres por pandilla</text><text x="575" y="285" class="small">Azul: despliegues</text>
